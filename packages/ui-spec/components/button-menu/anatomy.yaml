spec_version: '1.0'
component: ButtonMenu

schematic: |
  +---------------------+
  |  label        icon  |   root: <button> h=32
  +---------------------+
  label: text, leading
  icon: trailing chevron (down when closed, up when open), 16px

root:
  element: button
  role: button
  description: >-
    The button surface (background, border, radius). Holds the label and the
    trailing chevron; reflects aria-expanded while open.

parts:
  - id: label
    description: The button's text content, rendered before the chevron.
    element: span
  - id: icon
    description: >-
      The trailing chevron, sized to 16px. Points down when closed and up when
      open.
    element: svg

states:
  - {
      id: hover,
      trigger: pointer hover,
      kind: pseudo,
      pseudo: ':hover',
      affects: [root, label, icon],
    }
  - {
      id: pressed,
      trigger: pointer or keyboard activation,
      kind: pseudo,
      pseudo: ':active',
      affects: [root, label, icon],
    }
  - {
      id: focus-visible,
      trigger: keyboard focus,
      kind: pseudo,
      pseudo: ':focus-visible',
      affects: [root],
    }
  - {
      id: open,
      trigger: 'open === true',
      kind: prop,
      prop: open,
      affects: [root, label, icon],
    }
  - {
      id: disabled,
      trigger: 'disabled === true',
      kind: prop,
      prop: disabled,
      affects: [root, label, icon],
    }
