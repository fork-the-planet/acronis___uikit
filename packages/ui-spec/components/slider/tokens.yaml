spec_version: '1.0'
component: Slider

# References only. Values live in @acronis-platform/tokens-pd. No --ui-slider-*
# tier — semantic tokens: the rail is the divider gray, the filled indicator and
# thumb border use the brand action blue (secondary), and the thumb focus/drag
# ring uses the primary focus color.
source: '@acronis-platform/tokens-pd'

tokens:
  - name: --ui-border-on-surface-border
    affects: track
    description: The unfilled rail.
  - name: --ui-background-brand-secondary
    affects: indicator
    description: The filled portion and the thumb border (the action blue).
  - name: --ui-background-status-strong-neutral
    affects: indicator
    description: >-
      Muted (but still visible) fill + thumb border when disabled — a medium gray
      that stays distinct from the track.
  - name: --ui-background-surface-primary
    affects: thumb
    description: The thumb fill (bg-background).
  - name: --ui-focus-primary
    affects: thumb
    description: The thumb focus / dragging ring.
